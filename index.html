<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroPhase v10 - EEG 시뮬레이션</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://cdn.jsdelivr.net/npm/three@0.147.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/controls/OrbitControls.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #050816;
            color: white;
            font-family: sans-serif;
            overflow-x: hidden;
        }

        .v10-nav {
            width: 100%;
            padding: 20px 40px;
            position: fixed;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            background: rgba(5, 8, 22, 0.5);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .v10-hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 120px 20px 40px;
            background:
                radial-gradient(circle at center, rgba(56,189,248,0.15), transparent 40%),
                linear-gradient(to bottom, #050816, #0f172a);
        }

        .v10-hero-title {
            font-size: clamp(3rem, 8vw, 7rem);
            font-weight: 800;
            background: linear-gradient(90deg, #38bdf8, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            letter-spacing: -2px;
        }

        .v10-hero-sub {
            font-size: clamp(1rem, 2vw, 1.5rem);
            color: rgba(255,255,255,0.75);
            max-width: 700px;
            line-height: 1.7;
        }

        #brain3d {
            width: 100%;
            height: 500px;
            border-top: 1px solid rgba(255,255,255,0.1);
            background: linear-gradient(to bottom, #0f172a, #020617);
        }
    </style>
</head>
<body>

    <header class="v10-nav">
        <h2 style="color:#67e8f9;">NeuroPhase v10</h2>
    </header>

    <main>
        <section class="v10-hero">
            <h1 class="v10-hero-title">NeuroPhase</h1>
            <p class="v10-hero-sub">
                환상통 치료를 위한 AI 기반 EEG 역위상 상쇄 플랫폼
            </p>
        </section>

        <div id="brain3d"></div>
    </main>

    <script>
        const container = document.getElementById('brain3d');

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020617);

        const camera = new THREE.PerspectiveCamera(
            75,
            container.clientWidth / container.clientHeight,
            0.1,
            1000
        );

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0x38bdf8, 2);
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);

        const geometry = new THREE.SphereGeometry(2, 64, 64);

        const material = new THREE.MeshStandardMaterial({
            color: 0x7c3aed,
            emissive: 0x38bdf8,
            emissiveIntensity: 0.25,
            roughness: 0.3,
            metalness: 0.2
        });

        const brain = new THREE.Mesh(geometry, material);
        scene.add(brain);

        const ringGeometry = new THREE.TorusGeometry(2.7, 0.03, 16, 100);

        const ringMaterial = new THREE.MeshBasicMaterial({
            color: 0x38bdf8
        });

        const ring = new THREE.Mesh(ringGeometry, ringMaterial);
        ring.rotation.x = Math.PI / 2;
        scene.add(ring);

        camera.position.z = 6;

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.enableZoom = false;

        function animate() {
            requestAnimationFrame(animate);

            brain.rotation.y += 0.003;
            brain.rotation.x += 0.001;

            ring.rotation.z += 0.01;

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
    </script>

</body>
</html>
